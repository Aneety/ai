name: Security gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect security inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_codeql_sources: ${{ steps.detect.outputs.has_codeql_sources }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect CodeQL sources
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if find aneety-platform .github docs -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' \) -not -path '*/node_modules/*' | grep -q .; then
            echo "has_codeql_sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_codeql_sources=false" >> "$GITHUB_OUTPUT"
          fi

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Review dependency changes
        id: dependency_review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
      - name: Report dependency review availability
        shell: bash
        run: |
          if [ '${{ steps.dependency_review.outcome }}' = 'failure' ]; then
            echo 'Dependency review did not complete. Confirm dependency graph is enabled for this repository.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Dependency review completed.' >> "$GITHUB_STEP_SUMMARY"
          fi

  codeql:
    name: CodeQL analysis
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.detect.outputs.has_codeql_sources == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  secret-text-scan:
    name: Secret text scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan for likely committed secrets
        shell: bash
        run: |
          set -euo pipefail
          patterns='(CLOUDFLARE_API_TOKEN|SUPABASE_SERVICE_ROLE_KEY|PRIVATE_KEY|SECRET_ACCESS_KEY|GITHUB_TOKEN|API_KEY)[[:space:]]*=[[:space:]]*[^[:space:]$<{]'
          if grep -RInE "$patterns" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude='*.md' \
            --exclude='*.mmd' \
            --exclude='.github/workflows/security.yml'; then
            echo "Likely literal secret found. Store secrets outside Git." >&2
            exit 1
          fi
