name: Cloudflare deploy gate
run-name: Cloudflare gate ${{ inputs.mode || 'auto' }} ${{ inputs.controller_nonce || github.ref_name }}

on:
  workflow_run:
    workflows:
      - Remote CI gate
    types:
      - completed
  workflow_dispatch:
    inputs:
      module_path:
        description: Optional module path under aneety-platform/apps
        required: false
        type: string
      controller_nonce:
        description: Opaque controller correlation id
        required: false
        type: string
      mode:
        description: Run mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - deploy
          - smoke
      smoke_url:
        description: Published URL for smoke mode
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  CLOUDFLARE_DEPLOY_MODE: ${{ inputs.mode || 'dry-run' }}
  REQUESTED_MODULE_PATH: ${{ inputs.module_path || 'aneety-platform/apps' }}
  CONTROLLER_NONCE: ${{ inputs.controller_nonce || '' }}

concurrency:
  group: cloudflare-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cloudflare-gate:
    name: Cloudflare gate after green CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize Cloudflare gate result
        shell: bash
        run: |
          set -euo pipefail
          export GATE_RESULT_PATH="$RUNNER_TEMP/cloudflare-gate-result.json"
          echo "GATE_RESULT_PATH=$GATE_RESULT_PATH" >> "$GITHUB_ENV"
          node <<'NODE'
          const { writeFileSync } = require('node:fs');
          const payload = {
            mode: process.env.CLOUDFLARE_DEPLOY_MODE,
            modulePath: process.env.REQUESTED_MODULE_PATH,
            headSha: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID,
            runUrl: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            conclusion: 'pending',
            publishedUrl: '',
            smokeUrl: '',
            smokeStatus: '',
            controllerNonce: process.env.CONTROLLER_NONCE || '',
            failureCode: '',
            failureReason: '',
            missingServices: [],
          };
          writeFileSync(process.env.GATE_RESULT_PATH, `${JSON.stringify(payload, null, 2)}\n`);
          NODE

      - name: Discover deployable Workers
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          module_path='${{ inputs.module_path }}'

          if [ -n "$module_path" ]; then
            if [ ! -d "$module_path" ]; then
              echo "has_workers=false" >> "$GITHUB_OUTPUT"
              echo "effective_module_path=$module_path" >> "$GITHUB_OUTPUT"
              echo "Requested module path does not exist: $module_path"
              exit 0
            fi
            search_root="$module_path"
          else
            search_root="aneety-platform/apps"
          fi
          echo "effective_module_path=$search_root" >> "$GITHUB_OUTPUT"

          if [ ! -d "$search_root" ]; then
            echo "has_workers=false" >> "$GITHUB_OUTPUT"
            echo "No app directory found. Cloudflare gate exits without deploy."
            exit 0
          fi

          mapfile -t configs < <(
            find "$search_root" \
              -maxdepth 5 \
              \( -name wrangler.jsonc -o -name wrangler.json -o -name wrangler.toml \) \
              -not -path '*/node_modules/*' \
              | sort
          )

          if [ "${#configs[@]}" -eq 0 ]; then
            echo "has_workers=false" >> "$GITHUB_OUTPUT"
            echo "No Wrangler config found. Cloudflare gate exits without deploy."
            exit 0
          fi

          echo "has_workers=true" >> "$GITHUB_OUTPUT"
          {
            echo 'worker_dirs<<EOF'
            for config in "${configs[@]}"; do
              dirname "$config"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install and validate Worker modules
        if: steps.discover.outputs.has_workers == 'true' && env.CLOUDFLARE_DEPLOY_MODE != 'smoke'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r worker_dir; do
            [ -n "$worker_dir" ] || continue
            echo "::group::${worker_dir}"
            cd "$GITHUB_WORKSPACE/$worker_dir"
            if [ -f package.json ]; then
              if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
                npm ci
              else
                npm install
              fi
            fi
            npx --yes wrangler deploy --dry-run
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.worker_dirs }}"

      - name: Deploy Worker modules when explicitly requested
        if: steps.discover.outputs.has_workers == 'true' && env.CLOUDFLARE_DEPLOY_MODE == 'deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "DEPLOY_FAILURE_REASON=missing_cloudflare_secrets" >> "$GITHUB_ENV"
            echo "Cloudflare deploy secrets are not configured." >&2
            exit 1
          fi
          deploy_log="$(mktemp)"
          deploy_status=0
          while IFS= read -r worker_dir; do
            [ -n "$worker_dir" ] || continue
            echo "::group::deploy ${worker_dir}"
            cd "$GITHUB_WORKSPACE/$worker_dir"
            set +e
            npx --yes wrangler deploy 2>&1 | tee -a "$deploy_log"
            deploy_status=${PIPESTATUS[0]}
            set -e
            echo "::endgroup::"
            if [ "$deploy_status" -ne 0 ]; then
              break
            fi
          done <<< "${{ steps.discover.outputs.worker_dirs }}"
          if [ "$deploy_status" -ne 0 ]; then
            python3 -c 'import json,re,sys; from pathlib import Path; log = Path(sys.argv[1]).read_text(); env_path = Path(sys.argv[2]); pattern = r"Service binding '\''([^'\'']+)'\'' references Worker '\''([^'\'']+)'\'' which was not found\.[^\n]*\[code: (\d+)\]"; missing = list(dict.fromkeys(match.group(2).strip() for match in re.finditer(pattern, log) if match.group(2).strip())); env_path.open("a", encoding="utf-8").write("DEPLOY_FAILURE_CODE=10143\\nDEPLOY_FAILURE_REASON=service_binding_missing\\nDEPLOY_MISSING_SERVICES_JSON=" + json.dumps(missing, separators=(",", ":")) + "\\n") if missing else None' "$deploy_log" "$GITHUB_ENV"
            exit "$deploy_status"
          fi
          published_url="$(grep -Eo 'https://[^[:space:]]+' "$deploy_log" | grep -v 'github.com/' | tail -1 || true)"
          if [ -z "$published_url" ]; then
            echo "DEPLOY_FAILURE_REASON=published_url_missing" >> "$GITHUB_ENV"
            echo "Could not extract published URL from wrangler deploy output." >&2
            exit 1
          fi
          echo "PUBLISHED_URL=$published_url" >> "$GITHUB_ENV"

      - name: Smoke published URL
        if: env.CLOUDFLARE_DEPLOY_MODE == 'smoke'
        shell: bash
        run: |
          set -euo pipefail
          url='${{ inputs.smoke_url }}'
          if [ -z "$url" ]; then
            echo "smoke_url is required for smoke mode." >&2
            exit 1
          fi
          curl --fail --show-error --silent --max-time 20 "$url" >/tmp/aneety-smoke-response
          bytes=$(wc -c </tmp/aneety-smoke-response | tr -d ' ')
          echo "Smoke OK for $url (${bytes} bytes)."
          echo "SMOKE_STATUS=success" >> "$GITHUB_ENV"

      - name: Report no deployable module
        if: steps.discover.outputs.has_workers != 'true' && env.CLOUDFLARE_DEPLOY_MODE != 'smoke'
        shell: bash
        run: |
          echo "No deployable Cloudflare Worker config found. No Cloudflare deploy or dry-run executed."

      - name: Finalize Cloudflare gate result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          EFFECTIVE_MODULE_PATH: ${{ steps.discover.outputs.effective_module_path }}
          SMOKE_URL_INPUT: ${{ inputs.smoke_url || '' }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const payload = JSON.parse(readFileSync(process.env.GATE_RESULT_PATH, 'utf8'));
          payload.modulePath = process.env.EFFECTIVE_MODULE_PATH || payload.modulePath;
          payload.conclusion = process.env.JOB_STATUS || payload.conclusion;
          payload.publishedUrl = process.env.PUBLISHED_URL || payload.publishedUrl || '';
          payload.smokeUrl = process.env.SMOKE_URL_INPUT || payload.smokeUrl || '';
          payload.smokeStatus = process.env.SMOKE_STATUS || payload.smokeStatus || '';
          payload.failureCode = process.env.DEPLOY_FAILURE_CODE || payload.failureCode || '';
          payload.failureReason = process.env.DEPLOY_FAILURE_REASON || payload.failureReason || '';
          try {
            payload.missingServices = JSON.parse(process.env.DEPLOY_MISSING_SERVICES_JSON || '[]');
          } catch {
            payload.missingServices = payload.missingServices || [];
          }
          writeFileSync(process.env.GATE_RESULT_PATH, `${JSON.stringify(payload, null, 2)}\n`);
          NODE

      - name: Upload Cloudflare gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-gate-result
          path: ${{ env.GATE_RESULT_PATH }}
          if-no-files-found: error
